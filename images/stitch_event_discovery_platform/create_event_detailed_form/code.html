<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Event - diS_Cover</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Manrope:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#fefcff",
                        "on-primary-fixed-variant": "#0031c5",
                        "on-tertiary-fixed-variant": "#404754",
                        "on-secondary-fixed-variant": "#004395",
                        "tertiary-fixed-dim": "#c0c7d6",
                        "on-primary": "#ffffff",
                        "surface-container": "#eceef0",
                        "tertiary": "#555c6a",
                        "surface": "#f7f9fb",
                        "surface-tint": "#2c4de1",
                        "on-tertiary-fixed": "#151c27",
                        "secondary-fixed-dim": "#adc6ff",
                        "on-secondary-container": "#fefcff",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "tertiary-container": "#6e7583",
                        "on-primary-container": "#fffbff",
                        "inverse-primary": "#bac3ff",
                        "surface-container-highest": "#e0e3e5",
                        "inverse-on-surface": "#eff1f3",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#d8dadc",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#444655",
                        "secondary": "#0058be",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#dce2f3",
                        "on-error": "#ffffff",
                        "secondary-container": "#2170e4",
                        "secondary-fixed": "#d8e2ff",
                        "primary-fixed-dim": "#bac3ff",
                        "surface-variant": "#e0e3e5",
                        "primary-container": "#4766f8",
                        "outline-variant": "#c4c5d8",
                        "on-background": "#191c1e",
                        "primary": "#284ade",
                        "on-surface": "#191c1e",
                        "outline": "#747687",
                        "inverse-surface": "#2d3133",
                        "surface-container-low": "#f2f4f6",
                        "surface-bright": "#f7f9fb",
                        "on-primary-fixed": "#001159",
                        "primary-fixed": "#dee1ff",
                        "background": "#f7f9fb",
                        "on-secondary-fixed": "#001a42",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e6e8ea"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            }
        }
    </script>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl">
<div class="flex items-center px-6 h-16 w-full">
<button class="mr-4 active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-slate-500" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-bold tracking-tight font-headline text-[#284ade]">Create Event</h1>
</div>
</header>
<main class="pt-20 px-6 max-w-2xl mx-auto space-y-8">
<!-- Hero Section: Upload Poster -->
<section>
<div class="w-full aspect-video rounded-lg border-2 border-dashed border-outline-variant bg-surface-container-lowest flex flex-col items-center justify-center cursor-pointer hover:bg-surface-container-low transition-colors group">
<div class="w-14 h-14 rounded-full bg-primary-fixed flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="image">image</span>
</div>
<p class="font-headline font-bold text-on-surface">Upload Poster</p>
<p class="text-sm text-on-surface-variant mt-1">Recommended 1280x720px</p>
</div>
</section>
<!-- Form Sections -->
<div class="space-y-6">
<!-- Event Title -->
<div class="space-y-2">
<label class="text-sm font-bold font-headline text-on-surface-variant uppercase tracking-wider ml-1">Event Title</label>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm font-body" placeholder="Enter a catchy title" type="text"/>
</div>
</div>
<!-- Category Section -->
<section class="space-y-3">
<h3 class="text-sm font-bold font-headline text-on-surface-variant uppercase tracking-wider ml-1">Category</h3>
<div class="flex overflow-x-auto gap-3 pb-2 no-scrollbar -mx-6 px-6">
<button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-primary text-on-primary font-semibold text-sm shadow-lg shadow-primary/20 transition-all">Hackathon</button>
<button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Workshop</button>
<button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Cultural</button>
<button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Tech</button>
<button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Sports</button><button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Job Fairs</button><button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Exhibitions</button><button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Summits</button><button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Conference</button><button class="whitespace-nowrap px-6 py-2.5 rounded-full bg-surface-container-high text-on-surface-variant font-semibold text-sm hover:bg-surface-container-highest transition-colors">Talks</button></div>
</section>
<!-- Event Description -->
<div class="space-y-3">
<h3 class="text-sm font-bold font-headline text-on-surface-variant uppercase tracking-wider ml-1">Event Description</h3>
<textarea class="w-full p-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm resize-none font-body" placeholder="Brief summary of your event..." rows="3"></textarea>
</div>
<!-- Date, Time and Deadline Row -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="calendar_today">calendar_today</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm" placeholder="Event Date" type="text"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="schedule">schedule</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm" placeholder="Event Time" type="text"/>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="event_busy">event_busy</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm" placeholder="Deadline" type="text"/>
</div>
</div>
<!-- Venue -->
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="location_on">location_on</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm" placeholder="Venue or College Name" type="text"/>
</div>
<!-- About Event -->
<div class="space-y-3">
<h3 class="text-sm font-bold font-headline text-on-surface-variant uppercase tracking-wider ml-1">Rules &amp; Prizes</h3>
<textarea class="w-full p-4 bg-surface-container-lowest border-none rounded-DEFAULT focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-outline shadow-sm resize-none font-body" placeholder="Detailed rules, prizes, and further instructions..." rows="5"></textarea>
</div>
</div>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 left-0 w-full p-6 bg-white/60 backdrop-blur-xl border-t border-transparent">
<div class="max-w-2xl mx-auto">
<button class="w-full h-16 bg-[#4F6DFF] hover:bg-[#284ade] text-white font-headline font-extrabold text-lg rounded-xl shadow-xl shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span>Publish Event</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
</footer>
</body></html>
