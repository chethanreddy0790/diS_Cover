<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Slitch Story Viewer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Be+Vietnam+Pro:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-tint": "#474adb",
                    "on-primary-fixed-variant": "#2c2cc3",
                    "surface-container-low": "#f4f2ff",
                    "background": "#fbf8ff",
                    "error": "#ba1a1a",
                    "inverse-surface": "#2d2f44",
                    "surface-container-lowest": "#ffffff",
                    "inverse-on-surface": "#f1efff",
                    "tertiary": "#a62a30",
                    "surface-container-highest": "#e0e0fc",
                    "primary-fixed": "#e1e0ff",
                    "on-tertiary-fixed": "#410006",
                    "on-secondary-fixed": "#00201e",
                    "outline": "#767586",
                    "on-background": "#181a2e",
                    "secondary": "#006a65",
                    "on-tertiary-container": "#fff5f4",
                    "tertiary-fixed-dim": "#ffb3b0",
                    "on-tertiary": "#ffffff",
                    "surface": "#fbf8ff",
                    "on-error-container": "#93000a",
                    "error-container": "#ffdad6",
                    "primary": "#4143d5",
                    "on-secondary-container": "#006f69",
                    "on-secondary": "#ffffff",
                    "on-surface": "#181a2e",
                    "outline-variant": "#c6c5d7",
                    "tertiary-fixed": "#ffdad8",
                    "surface-bright": "#fbf8ff",
                    "surface-container": "#edecff",
                    "secondary-container": "#79f3ea",
                    "on-primary-fixed": "#05006c",
                    "on-tertiary-fixed-variant": "#8c1520",
                    "surface-variant": "#e0e0fc",
                    "on-secondary-fixed-variant": "#00504c",
                    "primary-fixed-dim": "#c0c1ff",
                    "on-primary": "#ffffff",
                    "primary-container": "#5b5fef",
                    "secondary-fixed": "#7cf6ec",
                    "surface-container-high": "#e6e6ff",
                    "on-surface-variant": "#464555",
                    "surface-dim": "#d7d8f4",
                    "tertiary-container": "#c84245",
                    "secondary-fixed-dim": "#5dd9d0",
                    "on-primary-container": "#f9f6ff",
                    "on-error": "#ffffff",
                    "inverse-primary": "#c0c1ff"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Be Vietnam Pro"],
                    "label": ["Be Vietnam Pro"]
            }
          },
        },
      }
    </script>
<style>
        .story-container {
            height: 100dvh;
            max-width: 500px;
            margin: 0 auto;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .story-gradient-top {
            background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
        }
        .story-gradient-bottom {
            background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 100%);
        }
        .progress-bar-bg {
            background-color: rgba(255, 255, 255, 0.3);
        }
        .progress-bar-active {
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-inverse-surface font-body">
<!-- Main Full-Screen Story Wrapper -->
<main class="relative story-container bg-surface-dim overflow-hidden shadow-2xl">
<!-- Background Image Content -->
<div class="absolute inset-0 z-0">
<img alt="Students at a campus event" class="w-full h-full object-cover" data-alt="Group of diverse university students laughing and cheering at a vibrant outdoor campus tech fair with blurred modern architecture background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBj7gN1mi3-fPUyxUFv0ovtQldwavvEMT1OMvJ1G4J245_5vQ7lIm9zXsgzSHU4nfr3tXTphxAzHiEnjiyFmXe9GoWAksI9dpt3bUqkm4whM3fDW3IPbR1VzJS8BZP8DWL4jEsk0e9HvuBnurabNEqWceDxKBPWfrQr50ruCAnnNG_uKDDyajJOmq2yvTPw2C_ykhvDxDBfHG72_pUe1I7Qo1TanO2vBvJBFBoB9Eh-O_BUfcEEEYaRBT3QWJ-LY8Gxl-mo-ucgRn8"/>
</div>
<!-- Overlays for Readability -->
<div class="absolute inset-0 z-10 story-gradient-top h-32"></div>
<div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-end story-gradient-bottom h-48 bottom-0"></div>
<!-- Top UI: Progress & Identity -->
<div class="absolute top-0 left-0 right-0 z-30 px-4 pt-3 space-y-4">
<!-- Segmented Progress Bar -->
<div class="flex gap-1.5 w-full">
<div class="h-1 flex-1 rounded-full progress-bar-active"></div>
<div class="h-1 flex-1 rounded-full progress-bar-active"></div>
<div class="h-1 flex-1 rounded-full progress-bar-bg overflow-hidden relative">
<div class="absolute top-0 left-0 bottom-0 w-1/3 bg-white rounded-full"></div>
</div>
<div class="h-1 flex-1 rounded-full progress-bar-bg"></div>
<div class="h-1 flex-1 rounded-full progress-bar-bg"></div>
</div>
<!-- Header: Avatar, Username, Close -->
<header class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full border-2 border-primary overflow-hidden p-0.5 bg-white">
<img alt="Tech Society Logo" class="w-full h-full object-cover rounded-full" data-alt="Professional minimalist tech society logo featuring abstract geometric circuitry patterns in indigo and white" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgnyzqc3xEqbtHt4J022tg5Vnhioif1vZ8pNpZIkZby0EuwF5X0R7I3Pzm3fUAly1zGNwGuhMLUt63bcPf9raIPp0QgLGsvrBVgLuMQpJs3zYGpVnZ6sehO0WXz6BJB-4cB40QtsY3jlkBTr4IlrJ4wq7zL56BXENjBXpDFWFRtiFT6GEQlSByL_gCoBkfxj0hg1ORCGOkI-vEnyQHrW2cnyoAGvbEvE0SWi023J2DVrZQTLxEUiYa3MpqhOHn3wP4szV8tgeovR0"/>
</div>
<div class="flex flex-col">
<span class="text-white font-headline font-bold text-sm tracking-tight">Tech Society</span>
<span class="text-white/80 text-[10px] font-label uppercase tracking-widest">2h ago</span>
</div>
</div>
<button class="w-10 h-10 flex items-center justify-center text-white/90 hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
</header>
</div>
<!-- Middle Interaction Layer: Tap Zones -->
<div class="absolute inset-0 z-20 flex">
<!-- Tap Previous -->
<div class="w-1/4 h-full cursor-pointer group flex items-center justify-start pl-4">
<div class="opacity-0 group-hover:opacity-100 transition-opacity bg-white/20 backdrop-blur-md rounded-full p-2 text-white">
<span class="material-symbols-outlined">chevron_left</span>
</div>
</div>
<!-- Center Void -->
<div class="flex-1 h-full"></div>
<!-- Tap Next -->
<div class="w-1/4 h-full cursor-pointer group flex items-center justify-end pr-4">
<div class="opacity-0 group-hover:opacity-100 transition-opacity bg-white/20 backdrop-blur-md rounded-full p-2 text-white">
<span class="material-symbols-outlined">chevron_right</span>
</div>
</div>
</div>
<!-- Floating Content Annotation -->
<div class="absolute bottom-28 left-4 right-4 z-30">
<div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-lg p-4 text-white">
<p class="font-headline font-semibold text-lg mb-1">Annual Hackathon Kickoff! 🚀</p>
<p class="font-body text-sm text-white/90 leading-relaxed">We're so excited to see over 200 builders here today. Let's build something amazing together!</p>
<div class="mt-3 flex items-center gap-2">
<span class="px-2.5 py-1 bg-primary text-[10px] font-label rounded-full uppercase tracking-wider">#STEM</span>
<span class="px-2.5 py-1 bg-secondary text-[10px] font-label rounded-full uppercase tracking-wider text-on-secondary">#Innovation</span>
</div>
</div>
</div>
<!-- Bottom UI: Interaction -->
<div class="absolute bottom-0 left-0 right-0 z-40 px-4 pb-8 pt-4">
<div class="flex items-center gap-3">
<div class="flex-1 relative group">
<input class="w-full bg-white/20 hover:bg-white/30 focus:bg-white/40 focus:ring-2 focus:ring-primary/50 border-none rounded-full px-6 py-3.5 text-white placeholder-white/70 text-sm backdrop-blur-md transition-all outline-none" placeholder="Send a message..." type="text"/>
</div>
<button class="w-12 h-12 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
<button class="w-12 h-12 bg-white/20 backdrop-blur-md text-white rounded-full flex items-center justify-center hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">favorite</span>
</button>
</div>
</div>
<!-- Contextual Momentum Badge (Academic Branding) -->
<div class="absolute top-24 right-4 z-30 pointer-events-none">
<div class="flex items-center gap-1.5 bg-tertiary-container/30 backdrop-blur-sm px-3 py-1.5 rounded-full border border-tertiary/20">
<span class="material-symbols-outlined text-tertiary text-lg" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-white font-label text-[11px] font-bold uppercase tracking-tight">Trending Event</span>
</div>
</div>
</main>
<!-- Visual Hint for Desktop Viewers -->
<div class="fixed top-1/2 left-8 -translate-y-1/2 hidden lg:flex flex-col gap-4 text-white/40">
<div class="flex items-center gap-4">
<kbd class="px-3 py-2 bg-white/10 rounded-lg text-xs font-mono">←</kbd>
<span class="text-sm font-label uppercase tracking-widest">Previous</span>
</div>
<div class="flex items-center gap-4">
<kbd class="px-3 py-2 bg-white/10 rounded-lg text-xs font-mono">→</kbd>
<span class="text-sm font-label uppercase tracking-widest">Next</span>
</div>
</div>
</body></html>
